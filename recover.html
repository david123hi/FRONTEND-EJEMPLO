<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Sport Club Pro</title>
    <link rel="stylesheet" href="css/style_login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<main class="login-container">

    <div class="logo-central">
        <img src="img/logo_empresa_letra_v1.png" alt="Sport Club Pro">
    </div>

    <section class="login-card">
        <h2>Recuperar contraseña</h2>
        <p>Ingresa tu correo para recuperar tu cuenta</p>

        <form action="#" method="post">

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" required>
            </div>

            <button type="submit" class="btn-login">Recuperar contraseña</button>
        </form>

        <!-- Mensaje simulado -->
        <p style="margin-top:15px; font-size:0.85rem; color:green;">
            Se ha enviado un enlace de recuperación a su correo
        </p>

        <div class="login-footer">
            <p>
                <a href="login.html" class="link-bold">Volver al login</a>
            </p>
        </div>

    </section>

</main>

</body>
</html>
