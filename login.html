<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SportClub</title>
    <link rel="stylesheet" href="css/style_login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<main class="login-container">
    
    <div class="logo-central">
        <img src="img/logo_empresa_letra_v1.png" alt="SportClub">
    </div>

    <section class="login-card">
        <h2>Iniciar sesión</h2>
        <p>Ingresa tus credenciales para acceder a tu panel</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="ejemplo@correo.com"
                    required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>

        <div class="login-footer">
            <a href="recover.html" class="link">¿Olvidaste tu contraseña?</a>
            <hr>
            <p>¿No tienes cuenta?
                <a href="register.html" class="link-bold">Regístrate</a>
            </p>
            <p class="back-home">
                <a href="index.html" class="link-bold">Volver al inicio</a>
            </p>
        </div>
    </section>

</main>

<script src="js/app.js"></script>
</body>
</html>
